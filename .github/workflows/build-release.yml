name: Build and Release LavenderHook

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read Version File
        id: get_version
        run: |
          $ver = Get-Content Version
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
        shell: powershell

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake (LavenderHook)
        run: cmake -B build-hook -S LavenderHook -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build LavenderHook
        run: cmake --build build-hook

      - name: Configure CMake (LavenderUpdater)
        run: cmake -B build-updater -S LavenderUpdater -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build LavenderUpdater
        run: cmake --build build-updater

      - name: Update Single Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "LavenderHook ${{ steps.get_version.outputs.VERSION }}"
          body: "Automated build of the latest version. Version: ${{ steps.get_version.outputs.VERSION }}"
          files: |
            build-hook/LavenderHook.dll
            build-updater/LavenderUpdater.dll
          make_latest: true
          overwrite: true 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}